name: Build

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_and_apk:
    name: "Local tests and APKs"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      security-events: write

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 5

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Check build-logic
        run: ./gradlew :build-logic:convention:check

      - name: Build all build type and flavor permutations
        run: ./gradlew :app:assemble -PminifyWithR8=false

      - name: Upload build outputs (APKs)
        uses: actions/upload-artifact@v7
        with:
          name: APKs
          path: '**/build/outputs/apk/**/*.apk'

      - name: Generate Git Changelog
        id: changelog
        run: |
          echo "git_changelog<<EOF" >> $GITHUB_OUTPUT
          git log -5 --pretty=format:"* %s (%h) - %an" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "latest_commit<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=format:"%B" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Continuous Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Continuous Build (Latest)
          body: |
            自动打包成功！这是最新的自动构建版本。
            
            ### 📝 最新更新内容 (Git Commit Info)
            ${{ steps.changelog.outputs.latest_commit }}
            
            ---
            ### 📜 近期提交历史 (Changelog)
            ${{ steps.changelog.outputs.git_changelog }}
            
            ---
            **构建分支**: `${{ github.ref_name }}`
            **提交哈希**: `${{ github.sha }}`
            **构建时间**: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          prerelease: true
          make_latest: true
          files: |
            app/build/outputs/apk/**/*.apk